[module/date]
type = internal/date
interval = 1

time-alt = "%H:%M"
time = "%a - %b %d %H:%M"

format = <label>
format-prefix = %{T10}%{T-}
format-prefix-background = ${colors.green}
format-prefix-foreground = ${colors.black}
format-prefix-padding = 1
format-underline = ${colors.green}
label = %{T2}%time%%{T-}
label-background = ${colors.bg-alt}
label-foreground = ${colors.fg}
label-padding = 1
